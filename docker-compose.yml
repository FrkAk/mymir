services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: mymir
      POSTGRES_PASSWORD: mymir
      POSTGRES_DB: mymir
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-auth.sql:/docker-entrypoint-initdb.d/01-auth.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mymir"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
