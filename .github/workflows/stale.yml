name: Close Stale Issues and PRs

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 14 days
            if there is no further activity. Comment to keep it open.
          close-issue-message: >
            Closed due to inactivity. Feel free to reopen with updated context.
          exempt-issue-labels: pinned,security,roadmap,help-wanted
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: stale
          stale-pr-message: >
            This pull request has been inactive for 30 days. It will be closed in 14 days
            if there is no further activity.
          close-pr-message: >
            Closed due to inactivity. Feel free to reopen when ready to continue.
          exempt-pr-labels: pinned,security,wip
          operations-per-run: 100
